<!DOCTYPE html>
<html>
<body>

<button onclick="verificar()">Verificar Triângulo</button>

<script>
function verificar() {
    const a = Number(prompt("Digite o valor de a:"));
    const b = Number(prompt("Digite o valor de b:"));
    const c = Number(prompt("Digite o valor de c:"));

    // validação
    if (isNaN(a) || isNaN(b) || isNaN(c)) {
        alert("Digite apenas números válidos.");
        return;
    }

    if (a <= 0 || b <= 0 || c <= 0) {
        alert("Os valores devem ser maiores que zero.");
        return;
    }

    // verifica triângulo
    if (a + b > c && a + c > b && b + c > a) {

        if (a === b && b === c) {
            alert("Triângulo Equilátero");
        } else if (a === b || a === c || b === c) {
            alert("Triângulo Isósceles");
        } else {
            alert("Triângulo Escaleno");
        }

    } else {
        alert("Não forma um triângulo.");
    }
}
</script>

</body>
</html>
